# Use the mouse wheel to enter copy mode.
#set-window-option -g mode-mouse on


# Window numbering starts from '1', '0' is too far away.
set -g base-index 1
set -g set-clipboard on

setw -g mode-keys vi


# Watch for activity in windows and highlight on the status line.
set-window-option -g monitor-activity on
# Numbering for panes is same as numbering for windows.
set-window-option -g pane-base-index 1

# Enable xterm-style key sequences and  modifiers such as Ctrl, Alt and Shift.
set-window-option -g xterm-keys off
# Allow each window to take up the maximum monitor width/height without forcing others.
set-window-option -g aggressive-resize on

# Clipboard manipulation.
bind-key C-c run "tmux save-buffer - |    xsel --input  --clipboard"
bind-key C-v run "tmux set-buffer -- \"$( xsel --output --clipboard )\"; tmux paste-buffer"

# Copy and pasting
#unbind-key -T copy-mode-vi Enter
#unbind-key -T copy-mode-vi Space
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

# Quick pane cycling with Ctrl-S.
bind-key  C-s select-pane -t :.+
unbind-key o

# Move around panes like in Vim (only in tmux 1.6).
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key h select-pane -L

bind-key r resize-pane -x 90

#unbind-key Up
#unbind-key Down
#unbind-key Left
#unbind-key Right

# Resize panes using Vi-style key bindings.
bind-key -r C-k resize-pane -U
bind-key -r C-j resize-pane -D
bind-key -r C-h resize-pane -L
bind-key -r C-l resize-pane -R

bind-key -r C-M-k resize-pane -U 5
bind-key -r C-M-j resize-pane -D 5
bind-key -r C-M-h resize-pane -L 5
bind-key -r C-M-l resize-pane -R 5

#unbind-key M-Up
#unbind-key M-Down
#unbind-key M-Left
#unbind-key M-Right

#unbind-key C-Up
#unbind-key C-Down
#unbind-key C-Left
#unbind-key C-Right

# Split window horizontally and vertically.
bind-key | split-window -h -c '#{pane_current_path}'
bind-key _ split-window -v -c '#{pane_current_path}'
bind-key c new-window -c '#{pane_current_path}'

##### COLOUR (Solarized light) --- {{{

if-shell "[[ $(tmux -V | cut -d' ' -f2 | tr -d 'a-z') < 2.1 ]]" \
    "set-option -g status-attr default; \
     set-option -g status-bg white; \
     set-option -g status-fg yellow; \
     set-window-option -g window-status-fg brightyellow; \
     set-window-option -g window-status-bg default; \
     set-window-option -g window-status-attr dim; \
     set-window-option -g window-status-current-fg brightred; \
     set-window-option -g window-status-current-bg default; \
     set-window-option -g window-status-current-attr bright; \
     set-option -g message-bg white; \
     set-option -g message-fg brightred; \
     set-option -g pane-border-fg white; \
     set-option -g pane-active-border-fg brightcyan; \
    " \
    "set-option -g message-style 'bg=white,fg=brightred'; \
     set-option -g pane-active-border-style 'fg=brightcyan'; \
     set-option -g pane-border-style 'fg=white'; \
     set-option -g status-style 'bg=white,fg=yellow,default'; \
     set-window-option -g window-status-current-style 'fg=brightred,bg=default,bright'; \
     set-window-option -g window-status-style 'fg=brightyellow,fg=default,dim'; \
    "
#    "set-option -g message-style 'bg=#eee8d5,fg=#cb4b16'; \
#     set-option -g pane-active-border-style 'fg=#93a1a1'; \
#     set-option -g pane-border-style 'fg=#eee8d5'; \
#     set-option -g status-style 'bg=#eee8d5,fg=#586e75'; \
#     set-window-option -g clock-mode-colour '#859900'; \
#     set-window-option -g mode-style 'bg=#eee8d5,fg=#073642'; \
#     set-window-option -g window-status-current-style 'bg=#fdf6e3,fg=#b58900,bold'; \
#     set-window-option -g window-status-style 'bg=#eee8d5,fg=#93a1a1'; \
#    "

# pane number display
set-option -g display-panes-active-colour blue #blue
set-option -g display-panes-colour brightred #orange

# clock
set-window-option -g clock-mode-colour green #green

# }}} --- COLOUR (Solarized light)
